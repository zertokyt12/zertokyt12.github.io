<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        .fullscreen-video {
            object-fit: cover;
            width: 95vw; /* Utilisation de viewport units pour définir la largeur */
            height: 95vh; /* Utilisation de viewport units pour définir la hauteur */
        }
    </style>
</head>
<body>

    <video class="fullscreen-video" autoplay loop muted playsinline>
        <source src="https://raw.githubusercontent.com/zertokyt12/zertokyt12.github.io/readme.ms/test.mp4?raw=true" type="video/mp4">
    </video>


    <!-- Modifier le lien pour modifier l'image -->
    <img id="img" src="https://th.bing.com/th/id/OIP.K3pPIsuGPVkaXI4arooLDAHaCC?w=349&h=96&c=7&r=0&o=5&dpr=1.5&pid=1.7">

    <script>
        document.getElementById("img").addEventListener("click", function () {
            window.open("https://youtube.com/@zertokyt", "_blank");
        });

        document.addEventListener('mousemove', function (event) {
            var cursorX = event.clientX;
            var cursorY = event.clientY;
            console.log("X:", cursorX);
            console.log("Y:", cursorY);
        });

        // Lecture automatique de la vidéo
        document.addEventListener("DOMContentLoaded", function () {
            var video = document.querySelector(".fullscreen-video");
            video.play();
        });
    </script>
</body>

</html>
